<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CombatBox Intel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-700">
        <div class="flex justify-between items-start mb-6">
            <h1 class="text-2xl font-bold text-white tracking-tight">CombatBox Intel</h1>
            <span id="status-badge" class="px-2 py-1 text-xs font-semibold rounded bg-green-500/20 text-green-400 border border-green-500/50">ONLINE</span>
        </div>

        <div class="space-y-6">
            <div>
                <p class="text-sm text-gray-400 uppercase tracking-widest font-semibold mb-1">Current Mission</p>
                <p id="mission-name" class="text-xl font-medium text-blue-400 italic">Loading...</p>
            </div>

            <div class="flex items-center space-x-4">
                <div class="bg-gray-700/50 p-4 rounded-xl flex-1 border border-gray-600">
                    <p class="text-xs text-gray-400 mb-1">Players</p>
                    <p id="player-count" class="text-3xl font-bold text-white">--</p>
                </div>
            </div>

            <div class="pt-4 border-t border-gray-700">
                <p class="text-[10px] text-gray-500 mb-2">DEVELOPER ACCESS (FREE API)</p>
                <a href="stats.json" target="_blank" class="text-xs text-blue-500 hover:text-blue-400 underline decoration-blue-500/30">
                    Get raw JSON data
                </a>
            </div>
        </div>
    </div>

    <script>
        // This script fetches your "scraped" data and injects it into the HTML
        async function updateDashboard() {
            try {
                const response = await fetch('stats.json');
                const data = await response.json();
                
                document.getElementById('mission-name').innerText = data.mission;
                document.getElementById('player-count').innerText = data.players_online;
                document.getElementById('status-badge').innerText = data.server_status.toUpperCase();
            } catch (error) {
                console.error("Error loading intel:", error);
            }
        }
        updateDashboard();
    </script>
</body>
</html>
